services:
  db: 
    image: postgres:16
    environment:
    - POSTGRES_USER=postgres                                                                                                                                 
    - POSTGRES_PASSWORD=postgres                                                                                                                             
    - POSTGRES_DB=polymarket
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data    
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5
  
volumes: 
  postgres_data:
